services:
  # ─── Redis ───
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API (Fastify + tRPC) ───
  backend:
    build:
      context: ./zero2exit-backend
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      # DATABASE_URL and DIRECT_URL are provided by Dokploy (Supabase connection string)
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: https://${DOMAIN}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(3000,'localhost').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Backend Worker (BullMQ) ───
  worker:
    build:
      context: ./zero2exit-backend
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # DATABASE_URL and DIRECT_URL are provided by Dokploy (Supabase connection string)
      REDIS_URL: redis://redis:6379
    networks:
      - internal
    command: ["node", "dist/worker.js"]

  # ─── Frontend (Next.js) — Traefik-routed ───
  frontend:
    build:
      context: ./zero2exit-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_API_URL: http://backend:3000

    env_file:
      - .env

    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    environment:
      NODE_ENV: production
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      NEXT_PUBLIC_API_URL: http://backend:3000

    networks:
      - internal
      - dokploy-network

    expose:
      - "3000"

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('net').connect(3000,'localhost').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  redisdata:

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true

