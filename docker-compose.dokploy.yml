services:
  # ─── Redis ───
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API (Fastify + tRPC) ───
  backend:
    build:
      context: ./zero2exit-backend
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      # DATABASE_URL and DIRECT_URL are provided by Dokploy (Supabase connection string)
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: https://${DOMAIN}
    networks:
      - internal
      - supabase-internal
      - dokploy-network                          # ← added: Traefik must be on the same network
    expose:
      - "3000"                                   # ← added: advertise port to Traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network" # ← tell Traefik which network to use
      # Prefer /api to this service (same host also matches frontend catch-all)
      - "traefik.http.routers.backend.priority=100"
      # Router: match /api on the same domain as the frontend
      - "traefik.http.routers.backend.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      # Service: forward to port 3000 inside the container
      - "traefik.http.services.backend.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(3000,'localhost').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Backend Worker (BullMQ) ───
  worker:
    build:
      context: ./zero2exit-backend
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # DATABASE_URL and DIRECT_URL are provided by Dokploy (Supabase connection string)
      REDIS_URL: redis://redis:6379
    networks:
      - internal
      - supabase-internal
    command: ["node", "dist/worker.js"]

  # ─── Frontend (Next.js) — Traefik-routed ───
  frontend:
    build:
      context: ./zero2exit-frontend
      dockerfile: Dockerfile
      args:
        # Server-side rewrites (Next → backend / Kong); must match .env used at build time
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3000}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:?Set NEXT_PUBLIC_SUPABASE_URL in .env}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:?Set NEXT_PUBLIC_SUPABASE_ANON_KEY in .env}
        # Proxy /supabase/* to Kong when Traefik sends traffic to Next (same as stripprefix on Kong router)
        SUPABASE_KONG_INTERNAL_URL: ${SUPABASE_KONG_INTERNAL_URL:-http://supabase-kong:8000}
        CACHE_BUST: 9

    env_file:
      - .env

    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3000}
      SUPABASE_KONG_INTERNAL_URL: ${SUPABASE_KONG_INTERNAL_URL:-http://supabase-kong:8000}

    networks:
      - internal
      - dokploy-network

    expose:
      - "3000"

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.zero2exit-frontend.priority=10"
      - "traefik.http.routers.zero2exit-frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.zero2exit-frontend.entrypoints=websecure"
      - "traefik.http.routers.zero2exit-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.zero2exit-frontend.service=zero2exit-frontend"
      - "traefik.http.services.zero2exit-frontend.loadbalancer.server.port=3000"

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('net').connect(3000,'localhost').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  redisdata:

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true
  supabase-internal:
    external: true
    name: supabase-internal

